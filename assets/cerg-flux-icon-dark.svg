<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <defs>
    <pattern id="meshG" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#4a6db5" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <radialGradient id="vG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4004a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#86002D" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="fC">
      <circle cx="180" cy="180" r="155"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="360" height="360" fill="#080b14"/>

  <circle cx="180" cy="180" r="158" fill="none" stroke="#4a6db5" stroke-width="1" opacity="0.3"/>
  <circle cx="180" cy="180" r="155" fill="#0d1220"/>
  <circle cx="180" cy="180" r="155" fill="url(#meshG)" clip-path="url(#fC)"/>

  <g clip-path="url(#fC)">
    <!-- Upper streamlines -->
    <path d="M 25 100 Q 75 95, 115 103 Q 145 113, 165 135 Q 180 153, 205 150 Q 245 143, 285 155 Q 315 165, 335 160" 
          fill="none" stroke="#4a6db5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 25 75 Q 85 70, 125 80 Q 160 95, 175 115 Q 190 135, 215 130 Q 255 120, 295 133 Q 325 143, 340 133" 
          fill="none" stroke="#4a6db5" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M 25 55 Q 95 50, 145 63 Q 180 75, 195 95 Q 210 115, 235 110 Q 275 100, 315 113 Q 340 123, 350 113" 
          fill="none" stroke="#4a6db5" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Approach -->
    <path d="M 25 125 Q 65 125, 95 135 Q 115 143, 123 155" 
          fill="none" stroke="#4a6db5" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <path d="M 25 150 Q 60 150, 90 155 Q 110 160, 120 170" 
          fill="none" stroke="#4a6db5" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>
    <path d="M 25 175 Q 55 173, 85 177 Q 105 182, 115 193" 
          fill="none" stroke="#4a6db5" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>

    <!-- Lower -->
    <path d="M 25 255 Q 75 260, 115 253 Q 145 243, 163 225 Q 177 210, 200 213 Q 240 219, 280 207 Q 313 197, 335 205" 
          fill="none" stroke="#4a6db5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M 25 285 Q 85 290, 125 280 Q 160 267, 175 247 Q 188 230, 210 233 Q 250 241, 290 230 Q 323 220, 340 230" 
          fill="none" stroke="#4a6db5" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M 25 310 Q 95 317, 145 305 Q 180 293, 195 273 Q 208 255, 230 257 Q 270 265, 310 253 Q 335 243, 350 253" 
          fill="none" stroke="#4a6db5" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

    <!-- Cylinder -->
    <circle cx="155" cy="195" r="18" fill="none" stroke="#4a6db5" stroke-width="1.5" opacity="0.2" stroke-dasharray="3 3"/>
    <circle cx="155" cy="195" r="2" fill="#4a6db5" opacity="0.15"/>

    <!-- Primary vortex -->
    <circle cx="223" cy="180" r="28" fill="url(#vG)"/>
    <path d="M 205 180 Q 210 163, 223 160 Q 237 158, 242 173 Q 245 187, 233 195 Q 221 200, 213 190 Q 207 183, 213 176" 
          fill="none" stroke="#c4004a" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
    <circle cx="223" cy="180" r="3.5" fill="#e0005a" opacity="0.9"/>

    <!-- Secondary vortex -->
    <circle cx="265" cy="225" r="20" fill="url(#vG)" opacity="0.5"/>
    <path d="M 277 225 Q 273 213, 263 211 Q 253 210, 250 220 Q 248 230, 257 235 Q 265 239, 272 233 Q 277 228, 273 223" 
          fill="none" stroke="#c4004a" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <circle cx="263" cy="223" r="2.5" fill="#e0005a" opacity="0.7"/>

    <!-- Tertiary -->
    <path d="M 303 187 Q 300 179, 294 178 Q 288 178, 287 184 Q 286 190, 292 193" 
          fill="none" stroke="#c4004a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="295" cy="185" r="1.8" fill="#e0005a" opacity="0.5"/>

    <!-- Tracers -->
    <circle cx="50" cy="115" r="1.5" fill="#4a6db5" opacity="0.35"/>
    <circle cx="67" cy="165" r="1.2" fill="#4a6db5" opacity="0.3"/>
    <circle cx="43" cy="240" r="1.3" fill="#4a6db5" opacity="0.35"/>
    <circle cx="80" cy="285" r="1.0" fill="#4a6db5" opacity="0.25"/>
    <circle cx="57" cy="195" r="1.8" fill="#4a6db5" opacity="0.25"/>
    <circle cx="150" cy="140" r="1.5" fill="#4a6db5" opacity="0.4"/>
    <circle cx="160" cy="265" r="1.3" fill="#4a6db5" opacity="0.35"/>
    <circle cx="305" cy="170" r="1.2" fill="#c4004a" opacity="0.4"/>
    <circle cx="315" cy="240" r="1.0" fill="#c4004a" opacity="0.35"/>

    <!-- Velocity arrows -->
    <line x1="47" y1="137" x2="63" y2="135" stroke="#4a6db5" stroke-width="0.8" opacity="0.35"/>
    <polygon points="63,132 68,135 63,138" fill="#4a6db5" opacity="0.35"/>
    <line x1="47" y1="267" x2="63" y2="269" stroke="#4a6db5" stroke-width="0.8" opacity="0.35"/>
    <polygon points="63,266 68,269 63,272" fill="#4a6db5" opacity="0.35"/>
  </g>

  <!-- Tick marks -->
  <line x1="180" y1="22" x2="180" y2="28" stroke="#4a6db5" stroke-width="1" opacity="0.25"/>
  <line x1="180" y1="332" x2="180" y2="338" stroke="#4a6db5" stroke-width="1" opacity="0.25"/>
  <line x1="22" y1="180" x2="28" y2="180" stroke="#4a6db5" stroke-width="1" opacity="0.25"/>
  <line x1="332" y1="180" x2="338" y2="180" stroke="#4a6db5" stroke-width="1" opacity="0.25"/>

  <text x="180" y="355" 
        font-family="'Courier New', 'Courier', monospace" 
        font-size="8" fill="#7a9dd4" text-anchor="middle">Re ≈ 200</text>
</svg>
